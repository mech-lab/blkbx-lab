name: Bug report
description: Report a user-visible defect in BLKBX Lab.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the defect and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include the command, API call, or minimal steps to reproduce.
      placeholder: |
        1. pip install --pre mechlab-sdk
        2. mechlab doctor
        3. observe ...
    validations:
      required: true
  - type: textarea
    id: artifacts
    attributes:
      label: Artifacts or logs
      description: Paste relevant manifest paths, receipt output, stack traces, or screenshots.
  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - mechlab CLI
        - blkbx_lab Python API
        - BLKBXS Python API
        - MAND8 Python API
        - DUE Python API
        - Qwen3.5 claims demo
        - Packaging, release docs, or extras
    validations:
      required: true
