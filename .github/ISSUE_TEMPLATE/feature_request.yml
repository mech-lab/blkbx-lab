name: Feature request
description: Propose a product or developer-facing improvement for mech-lab.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user workflow or developer workflow is blocked today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful improvement.
    validations:
      required: true
  - type: textarea
    id: contract
    attributes:
      label: Public contract impact
      description: Note any CLI, API, artifact, or release-surface changes.
