name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine

      - name: Check release readiness
        run: |
          python scripts/check_release_readiness.py

      - name: Build artifacts
        run: |
          python -m build
          python -m twine check dist/*

      - name: Smoke test wheel
        run: |
          tmpdir=$(mktemp -d)
          python -m venv "$tmpdir/venv"
          source "$tmpdir/venv/bin/activate"
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import blkbx_lab as bl

          result = bl.demo(output_dir="artifacts/release-ci")
          print(result.manifest_path)
          print(result.receipt_path)
          print(bl.verify(result.receipt_path).report)
          PY
          blkbx-lab doctor >/dev/null

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: blkbx-lab-dist
          path: dist/*

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: blkbx-lab-release-assets
          path: |
            assets/brand/og-card.png
            assets/brand/og-card.svg
            assets/brand/launch-card.svg
            assets/brand/release-header.svg

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          draft: true
          body_path: .github/RELEASE_TEMPLATE.md
          files: |
            dist/*
            assets/brand/og-card.png
            assets/brand/og-card.svg
            assets/brand/launch-card.svg
            assets/brand/release-header.svg

  publish-pypi:
    needs: build-release
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/blkbx-lab
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: blkbx-lab-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
