name: CI Pipeline
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Build and test
        run: \
          cargo build --verbose && \
          cargo test --verbose && \
          cargo clippy --all-targets --- D warnings && \
          cargo deny check --all-features && \
          cargo fuzz run all
      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: build-artifacts
          path: target/
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: clippy
      - name: Build fuzz targets
        run: cargo fuzz build --target-dir=target
      - name: Run fuzz tests
        uses: actions-runner-controller/self-hosted@v1
        with:
          command: cargo fuzz run all --target-dir=target
          timeout: 3600
      - name: Upload fuzz artifacts
        uses: actions/upload-artifact@v3
        with:
          name: fuzz-artifacts
          path: target/fuzz/results/
