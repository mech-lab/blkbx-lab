name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
    - name: Run ruff
      run: python -m ruff check .
    - name: Run pyright
      run: python -m pyright
    - name: Run pytest
      run: python -m pytest -q
    - name: Demo smoke test
      run: |
        blkbx-lab demo qwen35-claims --output-dir /tmp/qwen35-claims
        blkbx-lab verify /tmp/qwen35-claims/ink_receipt.v1.json
        blkbx-lab tamper /tmp/qwen35-claims/ink_receipt.v1.json
        ! blkbx-lab verify /tmp/qwen35-claims/ink_receipt.tampered.json
