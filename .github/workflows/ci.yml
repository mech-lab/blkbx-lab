name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.94.1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Focused Python contract tests
        run: |
          python -m pytest -q \
            tests/test_packaging_contracts.py \
            tests/test_readme_example.py \
            tests/test_release_readiness.py \
            tests/test_version_sync.py \
            tests/test_zero_js_native_verifier.py

      - name: Release-readiness docs gate
        run: |
          python scripts/check_local_release.py \
            --skip-clean-worktree \
            --skip-focused-tests \
            --skip-ruff \
            --skip-build \
            --skip-smoke

  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@1.94.1
        with:
          components: clippy

      - name: Cargo check
        run: cargo check --workspace --all-targets

      - name: Cargo test
        run: cargo test --workspace

      - name: No-alloc kernel checks
        run: ./scripts/check_no_alloc.sh

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny
        run: cargo deny check --all-features

  ruby:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/rails
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      - name: Install gems
        run: bundle install

      - name: Rails smoke specs
        run: bundle exec rspec spec/smoke

      - name: Zeitwerk check
        run: bundle exec rails zeitwerk:check

  typescript:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/ink-ts-verify
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Verify generated field ids
        run: node ./scripts/generate-field-ids.mjs --check

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
