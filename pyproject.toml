[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mech-lab"
version = "0.1.0a1"
description = "Façade-first SDK and CLI for mechanistic evidence bundles, receipts, and comparison packets"
authors = [{name = "mech-lab team"}]
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
keywords = ["mechanistic-interpretability", "release-assurance", "evidence-bundles", "numpy", "research"]
dependencies = [
  "jsonschema>=4.23",
  "numpy>=2.0",
  "pyarrow>=17.0",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: Implementation :: CPython",
  "Typing :: Typed",
]

[project.optional-dependencies]
viz = []
offline-topology = []
dev = ["build", "pyright", "pytest", "ruff", "twine"]

[project.scripts]
mechlab = "mech_lab.cli:main"

[tool.pytest.ini_options]
addopts = "-q"

[tool.setuptools.packages.find]
where = [".", "internal/blt/src", "internal/mair/src"]
include = ["blt*", "hybrid_mechlab*", "mair*", "mech_lab*"]
exclude = ["internal*", "legacy*"]

[tool.setuptools.package-data]
blt = ["configs/*.json", "configs/*.md"]
hybrid_mechlab = ["py.typed", "_rust.pyi"]
mair = ["schemas/*.json"]
mech_lab = ["py.typed"]
