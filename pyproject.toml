[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mair"
version = "0.1.0"
description = "Mechanism Assurance IR schemas, validators, and manifest helpers"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "MAIR Contributors" }]
dependencies = [
  "jsonschema>=4.23",
  "pyarrow>=17.0",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.3",
  "ruff>=0.6",
  "mypy>=1.11",
]

[project.scripts]
mair-validate = "mair.cli.validate:main"
mair-write-manifest = "mair.cli.write_manifest:main"
mair-hydrate = "mair.cli.hydrate:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["mair*"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.pytest.ini_options]
testpaths = ["tests"]
