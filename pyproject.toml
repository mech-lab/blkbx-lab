[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "blkbx-lab"
version = "0.1.0a2"
description = "Open-source Ink Receipt gates for accountable AI agents"
authors = [{name = "mech-lab team"}]
readme = {file = "docs/pypi.md", content-type = "text/markdown"}
license = "MIT"
requires-python = ">=3.10"
keywords = ["mechanistic-interpretability", "release-assurance", "evidence-bundles", "holonomy", "mair", "research", "slsa"]
dependencies = [
  "jsonschema>=4.23",
  "numpy>=2.0",
  "pyarrow>=17.0",
]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: Implementation :: CPython",
  "Typing :: Typed",
]

[project.optional-dependencies]
viz = []
offline-topology = []
dev = ["build", "pyright", "pytest", "ruff", "twine"]

[project.scripts]
blkbx-lab = "blkbx_lab.cli:main"

[project.urls]
Homepage = "https://github.com/mech-lab/blkbx-lab"
Documentation = "https://github.com/mech-lab/blkbx-lab/tree/main/docs"
Repository = "https://github.com/mech-lab/blkbx-lab"
Issues = "https://github.com/mech-lab/blkbx-lab/issues"
Changelog = "https://github.com/mech-lab/blkbx-lab/releases"
"Validation Report" = "https://github.com/mech-lab/blkbx-lab/blob/main/docs/qwen35-validation-report.md"

[tool.pytest.ini_options]
addopts = "-q"

[tool.setuptools.packages.find]
where = [".", "internal/blt/src", "internal/mair/src"]
include = ["blt*", "hybrid_mechlab*", "mair*", "blkbx_lab*"]
exclude = ["internal*", "legacy*"]

[tool.setuptools.package-data]
blt = ["configs/*.json", "configs/*.md"]
hybrid_mechlab = ["py.typed", "_rust.pyi"]
mair = ["schemas/*.json"]
blkbx_lab = ["py.typed"]
