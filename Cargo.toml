[workspace]
members = [
  "rust/crates/ink-core",
  "rust/crates/ink-host",
  "rust/crates/ink-py",
]
resolver = "2"

[workspace.package]
edition = "2021"
authors = ["BLKBX Lab contributors"]
license = "MIT"
version = "0.6.0"

[workspace.dependencies]
base64ct = { version = "1.7", default-features = false, features = ["alloc"] }
dirs = "6.0"
ed25519-dalek = { version = "2.2", default-features = false }
hex = "0.4"
pyo3 = { version = "0.24", features = ["abi3-py310", "extension-module"] }
rand = "0.9"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha2 = { version = "0.10", default-features = false }
thiserror = "2.0"
